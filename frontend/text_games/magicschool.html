<head>

<title>The Crystal Tower - A Magic School Story</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Segoe UI","Helvetica Neue",Arial,sans-serif;background:#0a0a2e;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px}.container{width:100%;max-width:640px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:24px;padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.badge{background:rgba(255,215,0,0.15);color:#ffd700;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:bold;letter-spacing:1px}.step{font-size:12px;color:rgba(255,255,255,0.35)}.game-title{text-align:center;margin-bottom:6px}.game-title h1{font-size:26px;color:#ffd700;font-weight:900}.chapter-title{text-align:center;color:rgba(255,255,255,0.55);font-size:14px;margin-bottom:18px;letter-spacing:2px}.story-box{background:rgba(255,255,255,0.04);border-left:3px solid rgba(255,215,0,0.4);padding:18px 22px;border-radius:0 12px 12px 0;margin-bottom:26px;min-height:60px;line-height:2;font-size:16px;color:#e8e8e8}.choices-label{color:rgba(255,215,0,0.65);font-size:13px;letter-spacing:2px;margin-bottom:12px;text-align:center}.choices{display:flex;flex-direction:column;gap:10px}.choice-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px 18px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:14px;color:#e0e0e0;font-size:15px;cursor:pointer;transition:all 0.3s;text-align:left;font-family:inherit;line-height:1.6}.choice-btn:hover{background:rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.4);transform:translateX(4px)}.choice-btn:active{transform:scale(0.98)}.choice-num{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:rgba(255,215,0,0.15);color:#ffd700;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px}.ending-screen{text-align:center}.ending-badge{display:inline-block;padding:7px 22px;border-radius:20px;font-weight:900;font-size:13px;letter-spacing:2px;margin-bottom:18px}.ending-title{font-size:24px;color:#ffd700;font-weight:900;margin-bottom:14px}.ending-text{font-size:15px;color:#e0e0e0;line-height:2;margin-bottom:24px}.btn-yellow{display:inline-block;padding:12px 32px;border-radius:30px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all 0.3s;margin:6px;background:linear-gradient(135deg,#ffd700,#ffaa00);color:#1a1a2e;border:none}.btn-ghost{display:inline-block;padding:12px 32px;border-radius:30px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all 0.3s;margin:6px;background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.25)}.btn-yellow:hover,.btn-ghost:hover{transform:scale(1.05)}.ending-tip{margin-top:18px;padding:14px;background:rgba(255,255,255,0.04);border-radius:12px;font-size:13px;color:rgba(255,255,255,0.5);line-height:1.8}.tag{display:inline-block;padding:4px 10px;border-radius:8px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);font-size:13px;margin:3px}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.story-box,.ending-screen{animation:fadeIn 0.4s ease}</style></head><body><div class="container" id="container"><div id="content"></div></div>
<script>
var GAME_TITLE='The Crystal Tower';var GAME_TYPE='MagicSchool';
var WORDS=[{w:'spell',m:'\u5492\u8bed'},{w:'wizard',m:'\u5deb\u5e08'},{w:'magic',m:'\u9b54\u6cd5'},{w:'potion',m:'\u9b54\u836f'},{w:'wand',m:'\u9b54\u6756'},{w:'dragon',m:'\u9f99'},{w:'apprentice',m:'\u5b66\u5f92'},{w:'enchant',m:'\u65bd\u9b54\u6cd5'},{w:'challenge',m:'\u6311\u6218'},{w:'mystery',m:'\u795e\u79d8'}];
var G={};
G['start']={title:'Chapter 1 \u00b7 Welcome to the Academy',text:'The gates of Starfall Academy swing open. Floating candles light the grand hall where Professor Ember, the head __wizard__, welcomes new students. "Each of you has a spark of __magic__ within. Your __wand__ will choose you at the Ceremony of Light tonight."<br><br>You clutch your acceptance letter. But as you walk to your dorm, you glimpse a shadowy figure slipping into the FORBIDDEN Crystal Tower. A __mystery__ already!',words:['wizard','magic','wand','mystery'],choices:[{t:'Follow the shadow! A true __apprentice__ seeks answers.',n:'c2a'},{t:'Report it to Professor Ember. Rules protect us for a reason.',n:'c2b'},{t:'Ignore it for now. Your first day is stressful enough without a __mystery__.',n:'c2c'}],e:false};
G['c2a']={title:'Chapter 2 \u00b7 Into the Shadows',text:'You slip through the tower door before it closes. A spiral staircase winds upward, lit by crystals that pulse with soft light. At the top, a room filled with ancient books and floating orbs.<br><br>The shadowy figure reveals itself \u2014 Professor Lumen, the youngest teacher at the academy. "An __apprentice__ with courage! I\'m researching a lost __spell__ to protect the school. But someone doesn\'t want me to succeed." She needs your help.',words:['apprentice','spell','magic'],choices:[{t:'"I\'ll help you!" A lost __spell__ sounds like the adventure of a lifetime.',n:'c3'},{t:'"Tell me more first." Blind trust isn\'t smart \u2014 even in a __wizard__\'s tower.',n:'c3'}],e:false};
G['c2b']={title:'Chapter 2 \u00b7 The Right Path',text:'Professor Ember listens carefully. "You did the right thing. The Crystal Tower is forbidden for good reason \u2014 it holds dangerous __magic__ from the old wars." She pauses. "But if someone IS in there... perhaps we should investigate together."<br><br>She hands you a training __wand__. "Just in case. A responsible __apprentice__ knows when to follow rules and when to break them wisely."',words:['magic','wand','apprentice'],choices:[{t:'Go with Professor Ember. A skilled __wizard__ at your side is priceless.',n:'c3'},{t:'Ask to investigate a different area. You noticed strange lights near the greenhouse.',n:'c3'}],e:false};
G['c2c']={title:'Chapter 2 \u00b7 A Quiet Beginning',text:'You unpack your trunk and focus on classes. __Potion__ brewing with Professor Moss is fascinating! You learn to mix a calming draught and a glow-in-the-dark ink.<br><br>But late at night, you can\'t sleep. The Crystal Tower glows through your window. Something is happening there. The __mystery__ keeps tugging at your thoughts. Maybe ignoring it was a mistake.',words:['potion','mystery','magic'],choices:[{t:'Investigate tonight. Better late than never for an __apprentice__!',n:'c3c'},{t:'Ask a classmate if they\'ve noticed anything strange.',n:'c3c'}],e:false};
G['c3']={title:'Chapter 3 \u00b7 The Lost Spell',text:'Professor Lumen spreads a dusty scroll across her desk. "This __spell__ can heal a sick __dragon__ in the forest beyond the academy. The poor creature has been suffering for weeks. But the spell requires a rare ingredient \u2014 moonstone dust from the Crystal Cavern."<br><br>She looks at you seriously. "The cavern is dangerous. But without the spell, the __dragon__ won\'t survive the winter." A real __challenge__ for any __apprentice__.',words:['spell','dragon','challenge','apprentice'],choices:[{t:'"I\'ll go to the Crystal Cavern." This is why you became an __apprentice__!',n:'c4'},{t:'"Can we ask others for help?" A team casts stronger __magic__.',n:'c4'}],e:false};
G['c4']={title:'Chapter 4 \u00b7 The Crystal Cavern',text:'The cavern sparkles with a thousand colors. Moonstone dust glitters on every wall! But at the center, a sleeping stone guardian blocks the way. Its eyes flicker open.<br><br>"WHO SEEKS THE SACRED DUST?" it booms. Your __wand__ shakes in your hand. The guardian tests all who enter with a riddle \u2014 or a battle. It\'s the moment every __wizard__\'s training prepares you for.',words:['wand','wizard','enchant'],choices:[{t:'Answer the riddle. Brains over brawn \u2014 a true __spell__ starts with thinking.',n:'c5'},{t:'Cast a sleeping __enchant__! Quick thinking and steady nerves win this.',n:'c5'}],e:false};
G['c5']={title:'Chapter 5 \u00b7 The Healer\'s Choice',text:'Moonstone dust secured! You rush back to Professor Lumen\'s tower. She smiles with relief and begins brewing the healing __potion__ immediately.<br><br>"The __dragon__ can be saved. But I need to warn you \u2014 this __spell__ requires a sacrifice of __magic__ energy. The caster will be weakened for weeks. I\'m prepared to do it, but..." She hesitates. An __apprentice__ could share the burden.',words:['potion','dragon','spell','magic','apprentice'],choices:[{t:'"Let me help cast it." Share the energy. Two hearts lighten any burden.',n:'e_gold'},{t:'"I trust you to do it alone." Let the expert handle the most dangerous part.',n:'e_silver'}],e:false};
G['c3c']={title:'Chapter 3 \u00b7 The Late Start',text:'You approach the Crystal Tower a week late. The trail is cold, but you notice something the earliest investigators missed: moonstone powder tracks leading toward the forest.<br><br>Professor Lumen is there, exhausted from days of secret research. "You came," she says wearily. "I thought no one noticed. There\'s a __dragon__ in the forest. It needs a healing __spell__, and I\'m running out of time." The __mystery__ is bigger than you thought.',words:['dragon','spell','mystery'],choices:[{t:'Help her gather the remaining ingredients. It\'s not too late to contribute.',n:'c4c'},{t:'Run and tell the head __wizard__. This is bigger than one person now.',n:'c4c'}],e:false};
G['c4c']={title:'Chapter 4 \u00b7 Racing Against Time',text:'The moonstone is scarce \u2014 most has already been collected by someone else. But you find enough for a weaker __potion__. Professor Lumen sighs. "This won\'t fully heal the __dragon__, but it might buy us more time."<br><br>Sometimes an __apprentice__ learns that not every problem has a perfect solution. You do the best you can with what you have, and that kind of __magic__ still matters.',words:['potion','dragon','apprentice','magic'],choices:[{t:'Brew the potion anyway. Something is better than nothing.',n:'c5c'},{t:'Search deeper in the cavern. There has to be more moonstone somewhere.',n:'c5c'}],e:false};
G['c5c']={title:'Chapter 5 \u00b7 A Dragon\'s Gratitude',text:'The weakened __potion__ works \u2014 not completely, but enough. The __dragon__ opens its eyes and gives a soft rumble that sounds almost like "thank you."<br><br>Professor Ember arrives with the full academy healing team. "You did well, young __apprentice__. The __dragon__ will recover fully in time."<br><br>You started late, but you still helped. The __mystery__ taught you: there\'s always something useful you can do, even if you didn\'t start at the beginning.',words:['potion','dragon','apprentice','mystery'],choices:[{t:'Accept your role. Not the hero, but a real helper \u2014 and that counts.',n:'e_bronze'},{t:'Promise to act faster next time. A __wizard__ learns from every experience.',n:'e_bronze'}],e:false};
G['e_gold']={e:true,ty:'gold',title:'Ending \u00b7 Heart of the Dragon',badge:'\u2b50 Best Ending',bbg:'linear-gradient(135deg,#ffd700,#ff8c00)',words:['dragon','magic'],text:'You place your hands beside Professor Lumen\'s on the glowing __potion__. "Together," you whisper. A surge of __magic__ flows through you both \u2014 warm, bright, and pure.<br><br>The __dragon__ rises, fully healed! Its scales shimmer like living jewels. It bows its great head to you and breathes a tiny flame that transforms into a crystal charm around your neck. "The dragon\'s blessing," Professor Lumen breathes. "You\'re no ordinary __apprentice__ now \u2014 you\'re a dragon-friend."<br><br>The entire academy celebrates your courage. Starfall Academy has a new legend \u2014 and it\'s you.',tip:'\ud83d\udca1 Sharing the burden with your mentor created the strongest magic of all \u2014 the magic of trust!'};
G['e_silver']={e:true,ty:'silver',title:'Ending \u00b7 Wisdom and Trust',badge:'\u2728 Great Ending',bbg:'linear-gradient(135deg,#c0c0c0,#7ec8e3)',words:['wizard','spell'],text:'You step back and let Professor Lumen cast the __spell__ alone. The __dragon__ heals beautifully, and Lumen collapses but smiles. "You made the right call. Two exhausted wizards wouldn\'t help anyone."<br><br>While she recovers, YOU take care of the dragon \u2014 feeding it, talking to it, learning its gentle nature. The other students call you "Dragon\'s Friend."<br><br>Being a great __wizard__ isn\'t always about casting the biggest spell. Sometimes it\'s about knowing when to support, when to wait, and when to trust.',tip:'\ud83d\udca1 Knowing when to step back and trust an expert is a sign of real wisdom. The dragon is grateful!'};
G['e_bronze']={e:true,ty:'bronze',title:'Ending \u00b7 Late but Not Too Late',badge:'\ud83c\udf31 Growth Ending',bbg:'linear-gradient(135deg,#cd7f32,#d4a574)',words:['apprentice','challenge'],text:'The dragon recovers slowly over the next month in the academy greenhouse. You visit every day after classes, bringing it treats and talking softly. It begins to recognize your voice and rumble happily when you arrive.<br><br>Professor Ember watches you with pride. "You came late to the __mystery__, but your heart was always in the right place. That\'s what makes a true __apprentice__ grow into a master."<br><br>Next semester, you\'re assigned as the official dragon caretaker. The __challenge__ taught you: even late participants can become essential.',tip:'\ud83d\udca1 Starting late doesn\'t mean failing. Your steady care made a real difference \u2014 next time, jump in sooner!'};
var V=[];function R(id){var c=G[id];if(!c){document.getElementById('content').innerHTML='<p style="color:#fff">Error: chapter not found.</p>';return;}V.push({id:id,choice:null,title:c.title||''});var box=document.getElementById('content');if(c.e){E(c);return;}var stepIdx=V.length;var prevHtml='';if(V.length>1&&V[V.length-2]&&V[V.length-2].choice){prevHtml='<div style="font-size:0.8rem;color:rgba(255,215,0,0.5);padding:8px 14px;margin-bottom:14px;border-radius:8px;background:rgba(255,215,0,0.05);line-height:1.6">\u21b3 <span style="font-weight:600">Your choice:</span> <span style="color:#ffd700">'+V[V.length-2].choice+'</span></div>';}var opts='';for(var i=0;i<c.choices.length;i++){var esc=c.choices[i].t.replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;");opts+='<button class="choice-btn" onclick="makeChoice(\''+c.choices[i].n+'\',\''+esc+'\')"><span class="choice-num">'+(i+1)+'</span><span>'+c.choices[i].t+'</span></button>';}box.innerHTML='<div class="top-bar"><span class="badge">Chapter '+stepIdx+'</span><span class="step">Path: '+stepIdx+' steps</span></div><div class="game-title"><h1>'+GAME_TITLE+'</h1></div><div class="chapter-title">'+c.title+'</div><div class="story-box">'+prevHtml+c.text+'</div><div class="choices-label">\u2014 Make Your Choice \u2014</div><div class="choices">'+opts+'</div>';}
function makeChoice(nextId,choiceText){if(V.length>0)V[V.length-1].choice=choiceText;var safeText=choiceText.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");var overlay=document.createElement('div');overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,10,46,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;animation:fadeIn 0.3s ease';overlay.innerHTML='<div style="text-align:center;max-width:500px;padding:30px"><div style="font-size:13px;color:rgba(255,215,0,0.5);letter-spacing:2px;margin-bottom:14px;text-transform:uppercase">You Chose</div><div style="font-size:19px;color:#ffd700;font-weight:700;line-height:1.6">"'+safeText+'"</div><div style="margin-top:28px;width:40px;height:2px;background:rgba(255,215,0,0.3);margin-left:auto;margin-right:auto"></div><div style="margin-top:18px;color:rgba(255,255,255,0.25);font-size:13px">Continuing...</div></div>';document.getElementById('content').appendChild(overlay);setTimeout(function(){if(overlay.parentNode)overlay.parentNode.removeChild(overlay);R(nextId);},1200);}
function E(c){var box=document.getElementById('content');var timelineHtml='';if(V.length>0){var steps=[];for(var i=0;i<V.length;i++){var step=V[i];steps.push('<div style="display:flex;align-items:flex-start;gap:10px;padding:6px 0"><span style="flex-shrink:0;width:24px;height:24px;border-radius:50%;background:rgba(255,215,0,0.15);color:#ffd700;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold">'+(i+1)+'</span><div style="flex:1;font-size:13px;color:#ccc;line-height:1.5"><div style="color:#ffd700;font-weight:600;font-size:13px">'+(step.title||'Step '+(i+1))+'</div>'+(step.choice?'<div style="font-size:12px;color:rgba(255,215,0,0.55);margin-top:1px">\u21b3 '+step.choice+'</div>':'')+'</div></div>');}timelineHtml=steps.join('');}try{var d={title:GAME_TITLE,storyType:GAME_TYPE,date:new Date().toISOString().slice(0,10),endingTitle:c.title,endingTy:c.ty||'unknown',badge:c.badge,timeline:V,words:WORDS};var h=JSON.parse(localStorage.getItem('wordQuest_gameHistory')||'[]');h.push(d);localStorage.setItem('wordQuest_gameHistory',JSON.stringify(h));}catch(e){}box.innerHTML='<div class="ending-screen"><div class="ending-badge" style="background:'+c.bbg+';color:#1a1a2e">'+c.badge+'</div><div class="ending-title">'+c.title+'</div><div class="ending-text">'+c.text+'</div><div class="ending-tip">'+c.tip+'</div><br><div style="text-align:left;padding:14px;background:rgba(255,255,255,0.03);border-radius:12px;margin:12px 0;max-height:280px;overflow-y:auto"><div style="font-size:13px;color:rgba(255,215,0,0.55);letter-spacing:2px;margin-bottom:10px;text-align:center;text-transform:uppercase">\ud83d\udcdc Your Story Timeline</div>'+timelineHtml+'</div><br><button class="btn-yellow" onclick="S()">\u25b6 Play Again</button>&nbsp;&nbsp;<button class="btn-ghost" onclick="B()">\u2190 Go Back</button>&nbsp;&nbsp;<button class="btn-ghost" onclick="startReview()">\ud83d\udcdd Review Words</button></div>';}
function N(id){R(id);}function S(){V=[];R('start');}function B(){if(V.length<=1){S();return;}V.pop();var p=V[V.length-1];V.pop();R(p?p.id:'start');}
var _reviewState=null;function startReview(){_reviewState={words:WORDS.slice().sort(function(){return 0.5-Math.random()}),idx:0,correct:0,wrong:[]};showReviewQuestion();}
function showReviewQuestion(){var s=_reviewState;if(s.idx>=s.words.length){showReviewResult();return;}var w=s.words[s.idx];var wp=WORDS.filter(function(x){return x.w!==w.w}).map(function(x){return x.m}).sort(function(){return 0.5-Math.random()});var o=[w.m];for(var i=0;i<3&&i<wp.length;i++)o.push(wp[i]);o.sort(function(){return 0.5-Math.random()});var h='<div class="ending-screen"><div class="ending-badge" style="background:linear-gradient(135deg,#4CAF50,#2196F3);color:#fff">\ud83d\udcdd Word Review</div><div class="ending-title" style="font-size:20px;margin-bottom:20px">What does "<b>'+w.w+'</b>" mean?</div><div class="choices">';for(var j=0;j<o.length;j++){h+='<button class="choice-btn" onclick="checkReviewAnswer(\''+w.w+'\',\''+o[j].replace(/'/g,"\\'")+'\',this)"><span class="choice-num">'+(j+1)+'</span><span>'+o[j]+'</span></button>';}h+='</div><p style="color:rgba(255,255,255,0.3);font-size:13px;margin-top:16px">'+(s.idx+1)+'/'+s.words.length+'</p></div>';document.getElementById('content').innerHTML=h;}
function checkReviewAnswer(word,selected,btn){var s=_reviewState;var correct=WORDS.filter(function(w){return w.w===word})[0].m;document.querySelectorAll('.choice-btn').forEach(function(b){b.style.pointerEvents='none'});if(selected===correct){btn.style.background='rgba(76,175,80,0.3)';btn.style.borderColor='#4CAF50';s.correct++;}else{btn.style.background='rgba(244,67,54,0.3)';btn.style.borderColor='#f44336';document.querySelectorAll('.choice-btn').forEach(function(b){if(b.querySelector('span:last-child').textContent===correct){b.style.background='rgba(76,175,80,0.3)';b.style.borderColor='#4CAF50';}});s.wrong.push({w:word,m:correct});}setTimeout(function(){s.idx++;showReviewQuestion();},1200);}
function showReviewResult(){var s=_reviewState;var pct=Math.round((s.correct/s.words.length)*100);var wh='';if(s.wrong.length>0){wh='<div style="margin-top:16px;padding:12px;background:rgba(255,255,255,0.04);border-radius:12px;text-align:left"><p style="color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:8px">Words to review:</p>';for(var i=0;i<s.wrong.length;i++){wh+='<span class="tag" style="background:rgba(244,67,54,0.15);color:#ff8a80">'+s.wrong[i].w+' = '+s.wrong[i].m+'</span>&nbsp;';}wh+='</div>';}document.getElementById('content').innerHTML='<div class="ending-screen"><div class="ending-badge" style="background:linear-gradient(135deg,#ffd700,#ffaa00);color:#1a1a2e">\u2705 Review Complete!</div><div class="ending-title">'+s.correct+'/'+s.words.length+' ('+pct+'%)</div><p style="color:#e0e0e0;font-size:15px;margin-bottom:8px">'+(pct===100?'Perfect! You know all the words!':pct>=70?'Great job! Almost there!':'Keep practicing! You\'ll get it!')+'</p>'+wh+'<br><button class="btn-yellow" onclick="startReview()">\ud83d\udd04 Review Again</button>&nbsp;&nbsp;<button class="btn-ghost" onclick="S()">\u2190 Back to Story</button></div>';}
R('start');
</script></body></html>
