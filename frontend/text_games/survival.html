<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wild Island - A Survival Story</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Segoe UI","Helvetica Neue",Arial,sans-serif;background:#0a0a2e;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px}
  .container{width:100%;max-width:640px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:24px;padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .badge{background:rgba(255,215,0,0.15);color:#ffd700;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:bold;letter-spacing:1px}
  .step{font-size:12px;color:rgba(255,255,255,0.35)}
  .game-title{text-align:center;margin-bottom:6px}
  .game-title h1{font-size:26px;color:#ffd700;font-weight:900}
  .chapter-title{text-align:center;color:rgba(255,255,255,0.55);font-size:14px;margin-bottom:18px;letter-spacing:2px}
  .story-box{background:rgba(255,255,255,0.04);border-left:3px solid rgba(255,215,0,0.4);padding:18px 22px;border-radius:0 12px 12px 0;margin-bottom:26px;min-height:60px;line-height:2;font-size:16px;color:#e8e8e8}
  .choices-label{color:rgba(255,215,0,0.65);font-size:13px;letter-spacing:2px;margin-bottom:12px;text-align:center}
  .choices{display:flex;flex-direction:column;gap:10px}
  .choice-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px 18px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:14px;color:#e0e0e0;font-size:15px;cursor:pointer;transition:all 0.3s;text-align:left;font-family:inherit;line-height:1.6}
  .choice-btn:hover{background:rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.4);transform:translateX(4px)}
  .choice-btn:active{transform:scale(0.98)}
  .choice-num{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:rgba(255,215,0,0.15);color:#ffd700;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px}
  .ending-screen{text-align:center}
  .ending-badge{display:inline-block;padding:7px 22px;border-radius:20px;font-weight:900;font-size:13px;letter-spacing:2px;margin-bottom:18px}
  .ending-title{font-size:24px;color:#ffd700;font-weight:900;margin-bottom:14px}
  .ending-text{font-size:15px;color:#e0e0e0;line-height:2;margin-bottom:24px}
  .btn-yellow{display:inline-block;padding:12px 32px;border-radius:30px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all 0.3s;margin:6px;background:linear-gradient(135deg,#ffd700,#ffaa00);color:#1a1a2e;border:none}
  .btn-ghost{display:inline-block;padding:12px 32px;border-radius:30px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all 0.3s;margin:6px;background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.25)}
  .btn-yellow:hover,.btn-ghost:hover{transform:scale(1.05)}
  .ending-tip{margin-top:18px;padding:14px;background:rgba(255,255,255,0.04);border-radius:12px;font-size:13px;color:rgba(255,255,255,0.5);line-height:1.8}
  .tag{display:inline-block;padding:4px 10px;border-radius:8px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);font-size:13px;margin:3px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .story-box,.ending-screen{animation:fadeIn 0.4s ease}
</style>
</head>
<body><div class="container" id="container"><div id="content"></div></div>
<script>
var GAME_TITLE='Wild Island';var GAME_TYPE='Survival';
var WORDS=[
  {w:'survive',m:'\u751f\u5b58'},{w:'shelter',m:'\u906e\u98ce\u6240'},{w:'rescue',m:'\u6551\u63f4'},
  {w:'signal',m:'\u4fe1\u53f7'},{w:'island',m:'\u5c9b\u5c7f'},{w:'resource',m:'\u8d44\u6e90'},
  {w:'wilderness',m:'\u8352\u91ce'},{w:'hope',m:'\u5e0c\u671b'},{w:'courage',m:'\u52c7\u6c14'},{w:'danger',m:'\u5371\u9669'}
];
var G={};
G['start']={title:'Chapter 1 \u00b7 Crash Landing',text:'The small plane shudders. Alarms blare. The pilot shouts: "Brace for impact!" Then \u2014 SPLASH!<br><br>You swim to shore, coughing salt water. The beach is empty. Jungle stretches in every direction. The plane is half-sunk in the lagoon. You\'re alone on a deserted __island__. To __survive__, you need to act fast. What\'s your first move?',words:['island','survive','rescue','hope'],choices:[{t:'Search the plane for supplies. Every __resource__ matters.',n:'c2a'},{t:'Build a __shelter__ on the beach before night falls.',n:'c2b'},{t:'Climb the tallest tree and shout for help. Someone might hear.',n:'c2c'}],e:false};
G['c2a']={title:'Chapter 2 \u00b7 Salvage Operation',text:'You dive into the lagoon and haul a waterproof bag from the wreck. Inside: a pocket knife, a first-aid kit, granola bars, and \u2014 a flare gun!<br><br>Your heart leaps with __hope__! But the flare gun only has one shot. In this __wilderness__, resources won\'t last forever. Every __resource__ used wisely could mean the difference between life and __danger__.',words:['hope','wilderness','resource','danger'],choices:[{t:'Fire the flare NOW. A passing ship might see the __signal__.',n:'c3'},{t:'Save the flare for later. Focus on finding food and water first.',n:'c3'}],e:false};
G['c2b']={title:'Chapter 2 \u00b7 Building Home',text:'Using palm fronds and driftwood, you build a sturdy __shelter__ against a cliff wall. It blocks wind and rain. For the first time since the crash, you feel a little __hope__.<br><br>But as night falls, strange sounds echo from the jungle \u2014 hoots, rustles, and something... bigger. __Survive__ means more than having a roof. It means staying alert in the __wilderness__.',words:['shelter','hope','survive','wilderness'],choices:[{t:'Stay in your shelter until morning. Safety first.',n:'c3'},{t:'Explore the jungle now. Learning the __island__ could save you later.',n:'c3'}],e:false};
G['c2c']={title:'Chapter 2 \u00b7 Crying for Help',text:'You climb the tallest palm tree, lungs burning. "HELLO! HELP!" Your voice cracks. Only sea birds answer.<br><br>From up here, you see the whole __island__ \u2014 it\'s bigger than you thought, shaped like a crescent moon. No boats. No planes. No __signal__ visible anywhere. Throat sore, you realize shouting won\'t bring __rescue__. Not yet. You need a better plan.',words:['island','signal','rescue','hope'],choices:[{t:'Build a signal fire on the beach. Smoke travels further than sound.',n:'c3c'},{t:'Take a deep breath and explore inland. Maybe there are more __resource__ there.',n:'c3c'}],e:false};
G['c3']={title:'Chapter 3 \u00b7 Island Secrets',text:'A week passes. You\'ve learned to fish with a sharpened stick and find fresh water in bamboo stalks. The __island__ is harsh but beautiful \u2014 waterfalls, tropical flowers, and birds that sing at dawn.<br><br>One morning, you discover something unexpected: footprints. Fresh ones. Not yours. Are there others on this __wilderness__? Or something you need __courage__ to face?',words:['island','wilderness','courage'],choices:[{t:'Follow the footprints. Finding others means better chances of __rescue__.',n:'c4'},{t:'Avoid the footprints. Stay in your safe area near the beach.',n:'c4'}],e:false};
G['c4']={title:'Chapter 4 \u00b7 The Other Survivor',text:'The footprints lead to a cave. Inside, huddled by a small fire, sits a girl about your age. Her name is Maya. She crashed here three days before you in a different plane.<br><br>"I thought I was alone," she whispers. "I was losing __hope__." Together, you combine supplies. Two minds are better than one for __survive__ \u2014 and much better company. But rations are still low. The __danger__ of starvation grows each day.',words:['hope','survive','danger','resource'],choices:[{t:'Use the flare gun now. Two people waving make a bigger __signal__.',n:'c5'},{t:'Build a raft. Take control of your own __rescue__.',n:'c5'}],e:false};
G['c5']={title:'Chapter 5 \u00b7 The Final Push',text:'The decision is made. Time is running out \u2014 water is getting harder to find and a storm is brewing on the horizon. Every choice from here could be your last on this __island__.<br><br>Maya looks at you. "Whatever happens, I\'m glad I found you." The __courage__ you\'ve built over these weeks shines in your eyes. One way or another, this chapter of your __survive__ ends today.',words:['island','courage','survive','rescue'],choices:[{t:'Fire the flare toward the storm\'s edge. Ships avoid storms \u2014 they might pass nearby.',n:'e_gold'},{t:'Wait out the storm in the cave, then signal together. Careful and steady.',n:'e_silver'}],e:false};
G['c3c']={title:'Chapter 3 \u00b7 Smoke Signals',text:'You gather dry leaves and green branches, building a smoky fire on the highest point of the beach. Black smoke curls into the sky \u2014 a universal __signal__ of distress.<br><br>You tend the fire for three days. Each night, you add wet leaves to make more smoke. It\'s slow, hard work, but every plume of smoke carries your __hope__ into the sky. Someone, somewhere, might see.',words:['signal','hope','rescue'],choices:[{t:'Build an even bigger fire. Make it impossible to miss.',n:'c4c'},{t:'Conserve wood. Focus on extending your __survive__ supplies.',n:'c4c'}],e:false};
G['c4c']={title:'Chapter 4 \u00b7 A Visitor Arrives',text:'On the fifth day, you see it \u2014 a distant speck on the horizon that grows into a fishing boat! The smoke __signal__ worked!<br><br>The fishermen pull up to the beach, amazed. "We saw your smoke from twenty miles away!" They offer you food and water. But one of them points out: a bigger storm is coming. They can take you, but the boat is small. Not everyone on the __island__ might be reached in time.',words:['signal','island','rescue'],choices:[{t:'Accept the ride. You\'ve done enough \u2014 let the authorities handle the rest.',n:'c5c'},{t:'Ask them to search for other survivors first. There might be more.',n:'c5c'}],e:false};
G['c5c']={title:'Chapter 5 \u00b7 Going Home',text:'The fishing boat chugs through choppy waves. You watch the __island__ shrink behind you \u2014 the beach, the jungle, the smoke signal fading into mist. What an experience.<br><br>The fishermen give you a blanket and a hot drink. "You did well to __survive__ out there alone," one says. "Not many adults could manage that."<br><br>The __rescue__ radio crackles. A proper helicopter search will begin at dawn. Your __hope__ helped others.',words:['island','survive','rescue','hope'],choices:[{t:'Be proud. You survived alone and helped save others.',n:'e_bronze'},{t:'Wish you\'d been braver. But you\'re wiser for next time.',n:'e_bronze'}],e:false};
G['e_gold']={e:true,ty:'gold',title:'Ending \u00b7 Rescued Together',badge:'\u2b50 Best Ending',bbg:'linear-gradient(135deg,#ffd700,#ff8c00)',words:['rescue','courage'],text:'BOOM! The flare shoots a brilliant red arc across the darkening sky. For ten agonizing minutes, nothing. Then \u2014 a spotlight sweeps the water.<br><br>A coast guard ship appears through the rain! Sailors lower a lifeboat. You and Maya are pulled aboard, wrapped in warm blankets. The captain shakes his head in amazement. "That __signal__ saved your lives."<br><br>Soon, you\'re back home, hugging your family. Maya becomes your best friend. Your __courage__ and teamwork turned a disaster into a story of __hope__ and bravery.',tip:'\ud83d\udca1 Two people, one perfect decision at the right moment \u2014 that\'s how survival stories become legends!'};
G['e_silver']={e:true,ty:'silver',title:'Ending \u00b7 Patience Rewarded',badge:'\u2728 Great Ending',bbg:'linear-gradient(135deg,#c0c0c0,#7ec8e3)',words:['survive','signal'],text:'The storm rages for two days, then clears to a perfect blue sky. You and Maya climb to the ridge and fire the flare. This time, a passing cargo ship spots the __signal__ within an hour.<br><br>The crew welcomes you aboard with hot soup and fresh clothes. "You were smart to wait," the captain says. "That storm would have swallowed any small craft."<br><br>Your patience saved you. Sometimes the bravest thing in the __wilderness__ is knowing when to move \u2014 and when to wait.',tip:'\ud83d\udca1 Patience is a survival skill too. Waiting for the right moment made all the difference!'};
G['e_bronze']={e:true,ty:'bronze',title:'Ending \u00b7 Lessons of the Island',badge:'\ud83c\udf31 Growth Ending',bbg:'linear-gradient(135deg,#cd7f32,#d4a574)',words:['courage','hope'],text:'Back on the mainland, reporters call you a hero. You shrug. "I just did what I had to." But privately, you know the __island__ changed you.<br><br>You learned that __courage__ is not about never being scared \u2014 it\'s about keeping __hope__ alive even when things feel impossible. You learned to fish, build shelter, read the sky, and trust your instincts.<br><br>Next time life throws you into deep water, you\'ll be ready. The __wilderness__ taught you more than any classroom ever could.',tip:'\ud83d\udca1 You returned wiser and stronger. Not every adventure goes perfectly, but every one teaches something valuable!'};
var V=[];
function R(id){var c=G[id];if(!c){document.getElementById('content').innerHTML='<p style="color:#fff">Error: chapter not found.</p>';return;}V.push({id:id,choice:null,title:c.title||''});var box=document.getElementById('content');if(c.e){E(c);return;}var stepIdx=V.length;var prevHtml='';if(V.length>1&&V[V.length-2]&&V[V.length-2].choice){prevHtml='<div style="font-size:0.8rem;color:rgba(255,215,0,0.5);padding:8px 14px;margin-bottom:14px;border-radius:8px;background:rgba(255,215,0,0.05);line-height:1.6">\u21b3 <span style="font-weight:600">Your choice:</span> <span style="color:#ffd700">'+V[V.length-2].choice+'</span></div>';}var opts='';for(var i=0;i<c.choices.length;i++){var esc=c.choices[i].t.replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;");opts+='<button class="choice-btn" onclick="makeChoice(\''+c.choices[i].n+'\',\''+esc+'\')"><span class="choice-num">'+(i+1)+'</span><span>'+c.choices[i].t+'</span></button>';}box.innerHTML='<div class="top-bar"><span class="badge">Chapter '+stepIdx+'</span><span class="step">Path: '+stepIdx+' steps</span></div><div class="game-title"><h1>'+GAME_TITLE+'</h1></div><div class="chapter-title">'+c.title+'</div><div class="story-box">'+prevHtml+c.text+'</div><div class="choices-label">\u2014 Make Your Choice \u2014</div><div class="choices">'+opts+'</div>';}
function makeChoice(nextId,choiceText){if(V.length>0)V[V.length-1].choice=choiceText;var safeText=choiceText.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");var overlay=document.createElement('div');overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,10,46,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;animation:fadeIn 0.3s ease';overlay.innerHTML='<div style="text-align:center;max-width:500px;padding:30px"><div style="font-size:13px;color:rgba(255,215,0,0.5);letter-spacing:2px;margin-bottom:14px;text-transform:uppercase">You Chose</div><div style="font-size:19px;color:#ffd700;font-weight:700;line-height:1.6">"'+safeText+'"</div><div style="margin-top:28px;width:40px;height:2px;background:rgba(255,215,0,0.3);margin-left:auto;margin-right:auto"></div><div style="margin-top:18px;color:rgba(255,255,255,0.25);font-size:13px">Continuing...</div></div>';document.getElementById('content').appendChild(overlay);setTimeout(function(){if(overlay.parentNode)overlay.parentNode.removeChild(overlay);R(nextId);},1200);}
function E(c){var box=document.getElementById('content');var timelineHtml='';if(V.length>0){var steps=[];for(var i=0;i<V.length;i++){var step=V[i];steps.push('<div style="display:flex;align-items:flex-start;gap:10px;padding:6px 0"><span style="flex-shrink:0;width:24px;height:24px;border-radius:50%;background:rgba(255,215,0,0.15);color:#ffd700;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold">'+(i+1)+'</span><div style="flex:1;font-size:13px;color:#ccc;line-height:1.5"><div style="color:#ffd700;font-weight:600;font-size:13px">'+(step.title||'Step '+(i+1))+'</div>'+(step.choice?'<div style="font-size:12px;color:rgba(255,215,0,0.55);margin-top:1px">\u21b3 '+step.choice+'</div>':'')+'</div></div>');}timelineHtml=steps.join('');}try{var d={title:GAME_TITLE,storyType:GAME_TYPE,date:new Date().toISOString().slice(0,10),endingTitle:c.title,endingTy:c.ty||'unknown',badge:c.badge,timeline:V,words:WORDS};var h=JSON.parse(localStorage.getItem('wordQuest_gameHistory')||'[]');h.push(d);localStorage.setItem('wordQuest_gameHistory',JSON.stringify(h));}catch(e){}box.innerHTML='<div class="ending-screen"><div class="ending-badge" style="background:'+c.bbg+';color:#1a1a2e">'+c.badge+'</div><div class="ending-title">'+c.title+'</div><div class="ending-text">'+c.text+'</div><div class="ending-tip">'+c.tip+'</div><br><div style="text-align:left;padding:14px;background:rgba(255,255,255,0.03);border-radius:12px;margin:12px 0;max-height:280px;overflow-y:auto"><div style="font-size:13px;color:rgba(255,215,0,0.55);letter-spacing:2px;margin-bottom:10px;text-align:center;text-transform:uppercase">\ud83d\udcdc Your Story Timeline</div>'+timelineHtml+'</div><br><button class="btn-yellow" onclick="S()">\u25b6 Play Again</button>&nbsp;&nbsp;<button class="btn-ghost" onclick="B()">\u2190 Go Back</button>&nbsp;&nbsp;<button class="btn-ghost" onclick="startReview()">\ud83d\udcdd Review Words</button></div>';}
function N(id){R(id);}function S(){V=[];R('start');}function B(){if(V.length<=1){S();return;}V.pop();var p=V[V.length-1];V.pop();R(p?p.id:'start');}
var _reviewState=null;function startReview(){_reviewState={words:WORDS.slice().sort(function(){return 0.5-Math.random()}),idx:0,correct:0,wrong:[]};showReviewQuestion();}
function showReviewQuestion(){var s=_reviewState;if(s.idx>=s.words.length){showReviewResult();return;}var w=s.words[s.idx];var wp=WORDS.filter(function(x){return x.w!==w.w}).map(function(x){return x.m}).sort(function(){return 0.5-Math.random()});var o=[w.m];for(var i=0;i<3&&i<wp.length;i++)o.push(wp[i]);o.sort(function(){return 0.5-Math.random()});var h='<div class="ending-screen"><div class="ending-badge" style="background:linear-gradient(135deg,#4CAF50,#2196F3);color:#fff">\ud83d\udcdd Word Review</div><div class="ending-title" style="font-size:20px;margin-bottom:20px">What does "<b>'+w.w+'</b>" mean?</div><div class="choices">';for(var j=0;j<o.length;j++){h+='<button class="choice-btn" onclick="checkReviewAnswer(\''+w.w+'\',\''+o[j].replace(/'/g,"\\'")+'\',this)"><span class="choice-num">'+(j+1)+'</span><span>'+o[j]+'</span></button>';}h+='</div><p style="color:rgba(255,255,255,0.3);font-size:13px;margin-top:16px">'+(s.idx+1)+'/'+s.words.length+'</p></div>';document.getElementById('content').innerHTML=h;}
function checkReviewAnswer(word,selected,btn){var s=_reviewState;var correct=WORDS.filter(function(w){return w.w===word})[0].m;document.querySelectorAll('.choice-btn').forEach(function(b){b.style.pointerEvents='none'});if(selected===correct){btn.style.background='rgba(76,175,80,0.3)';btn.style.borderColor='#4CAF50';s.correct++;}else{btn.style.background='rgba(244,67,54,0.3)';btn.style.borderColor='#f44336';document.querySelectorAll('.choice-btn').forEach(function(b){if(b.querySelector('span:last-child').textContent===correct){b.style.background='rgba(76,175,80,0.3)';b.style.borderColor='#4CAF50';}});s.wrong.push({w:word,m:correct});}setTimeout(function(){s.idx++;showReviewQuestion();},1200);}
function showReviewResult(){var s=_reviewState;var pct=Math.round((s.correct/s.words.length)*100);var wh='';if(s.wrong.length>0){wh='<div style="margin-top:16px;padding:12px;background:rgba(255,255,255,0.04);border-radius:12px;text-align:left"><p style="color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:8px">Words to review:</p>';for(var i=0;i<s.wrong.length;i++){wh+='<span class="tag" style="background:rgba(244,67,54,0.15);color:#ff8a80">'+s.wrong[i].w+' = '+s.wrong[i].m+'</span>&nbsp;';}wh+='</div>';}document.getElementById('content').innerHTML='<div class="ending-screen"><div class="ending-badge" style="background:linear-gradient(135deg,#ffd700,#ffaa00);color:#1a1a2e">\u2705 Review Complete!</div><div class="ending-title">'+s.correct+'/'+s.words.length+' ('+pct+'%)</div><p style="color:#e0e0e0;font-size:15px;margin-bottom:8px">'+(pct===100?'Perfect! You know all the words!':pct>=70?'Great job! Almost there!':'Keep practicing! You\'ll get it!')+'</p>'+wh+'<br><button class="btn-yellow" onclick="startReview()">\ud83d\udd04 Review Again</button>&nbsp;&nbsp;<button class="btn-ghost" onclick="S()">\u2190 Back to Story</button></div>';}
R('start');
</script></body></html>
