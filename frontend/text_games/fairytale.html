<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Enchanted Garden - A Fairy Tale</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Segoe UI","Helvetica Neue",Arial,sans-serif;background:#0a0a2e;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px}
  .container{width:100%;max-width:640px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:24px;padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .badge{background:rgba(255,215,0,0.15);color:#ffd700;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:bold;letter-spacing:1px}
  .step{font-size:12px;color:rgba(255,255,255,0.35)}
  .game-title{text-align:center;margin-bottom:6px}
  .game-title h1{font-size:26px;color:#ffd700;font-weight:900}
  .chapter-title{text-align:center;color:rgba(255,255,255,0.55);font-size:14px;margin-bottom:18px;letter-spacing:2px}
  .story-box{background:rgba(255,255,255,0.04);border-left:3px solid rgba(255,215,0,0.4);padding:18px 22px;border-radius:0 12px 12px 0;margin-bottom:26px;min-height:60px;line-height:2;font-size:16px;color:#e8e8e8}
  .choices-label{color:rgba(255,215,0,0.65);font-size:13px;letter-spacing:2px;margin-bottom:12px;text-align:center}
  .choices{display:flex;flex-direction:column;gap:10px}
  .choice-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px 18px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:14px;color:#e0e0e0;font-size:15px;cursor:pointer;transition:all 0.3s;text-align:left;font-family:inherit;line-height:1.6}
  .choice-btn:hover{background:rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.4);transform:translateX(4px)}
  .choice-btn:active{transform:scale(0.98)}
  .choice-num{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:rgba(255,215,0,0.15);color:#ffd700;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px}
  .ending-screen{text-align:center}
  .ending-badge{display:inline-block;padding:7px 22px;border-radius:20px;font-weight:900;font-size:13px;letter-spacing:2px;margin-bottom:18px}
  .ending-title{font-size:24px;color:#ffd700;font-weight:900;margin-bottom:14px}
  .ending-text{font-size:15px;color:#e0e0e0;line-height:2;margin-bottom:24px}
  .btn-yellow{display:inline-block;padding:12px 32px;border-radius:30px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all 0.3s;margin:6px;background:linear-gradient(135deg,#ffd700,#ffaa00);color:#1a1a2e;border:none}
  .btn-ghost{display:inline-block;padding:12px 32px;border-radius:30px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all 0.3s;margin:6px;background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.25)}
  .btn-yellow:hover,.btn-ghost:hover{transform:scale(1.05)}
  .ending-tip{margin-top:18px;padding:14px;background:rgba(255,255,255,0.04);border-radius:12px;font-size:13px;color:rgba(255,255,255,0.5);line-height:1.8}
  .tag{display:inline-block;padding:4px 10px;border-radius:8px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);font-size:13px;margin:3px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .story-box,.ending-screen{animation:fadeIn 0.4s ease}
</style>
</head>
<body><div class="container" id="container"><div id="content"></div></div>
<script>
var GAME_TITLE='The Enchanted Garden';var GAME_TYPE='FairyTale';
var WORDS=[
  {w:'enchanted',m:'\u88ab\u65bd\u4e86\u9b54\u6cd5\u7684'},{w:'castle',m:'\u57ce\u5821'},{w:'magical',m:'\u9b54\u6cd5\u7684'},
  {w:'kingdom',m:'\u738b\u56fd'},{w:'brave',m:'\u52c7\u6562\u7684'},{w:'quest',m:'\u63a2\u5bfb'},
  {w:'secret',m:'\u79d8\u5bc6'},{w:'treasure',m:'\u5b9d\u85cf'},{w:'wish',m:'\u613f\u671b'},{w:'wonder',m:'\u5947\u8ff9'}
];
var G={};
G['start']={title:'Chapter 1 \u00b7 The Golden Key',text:'One rainy afternoon, you\'re exploring your grandmother\'s old garden when your shovel hits something hard. You dig up a small golden key covered in tiny stars that twinkle even in the dim light.<br><br>Your grandmother smiles. "That key belonged to your great-grandmother. They say it opens a door to an __enchanted__ __kingdom__." At the back of the garden, hidden behind ivy, you find a door you\'ve never seen before. A true __wonder__ awaits. What do you do?',words:['enchanted','kingdom','wonder'],choices:[{t:'Use the key now! A __magical__ adventure is calling!',n:'c2a'},{t:'Ask Grandmother for the full story first. Knowledge before action.',n:'c2b'},{t:'Keep the key safe and wait. Some doors shouldn\'t be opened lightly.',n:'c2c'}],e:false};
G['c2a']={title:'Chapter 2 \u00b7 Through the Garden Door',text:'The key slides into the lock. CLICK! The door swings open to reveal a world of impossible colors \u2014 purple grass, silver trees, and a sky filled with two glowing moons.<br><br>A tiny winged creature zips up to you. "Welcome, traveler! I\'m Pip, guardian of the Whispering Woods. Your key marks you as a true __brave__ soul. Many seek the __enchanted__ __castle__, but few are worthy. Your __quest__ begins now!"',words:['brave','enchanted','castle','quest'],choices:[{t:'Follow Pip immediately. Adventure waits for no one!',n:'c3'},{t:'Ask Pip about the dangers ahead. A smart __brave__ prepares first.',n:'c3'}],e:false};
G['c2b']={title:'Chapter 2 \u00b7 Grandmother\'s Story',text:'Grandmother pours tea and tells you an amazing tale. "The __enchanted__ __kingdom__ is real. Long ago, our family was chosen to protect its __secret__. The key opens the door, but only a pure heart can unlock the __treasure__ within \u2014 a single __wish__ that can heal anything."<br><br>Your eyes widen. A wish! You think of Grandpa, who has been sick for months. Could this be his cure?',words:['enchanted','kingdom','secret','treasure','wish'],choices:[{t:'Go through the door. You must try to earn that __wish__ for Grandpa.',n:'c3'},{t:'Ask Grandmother to come with you. Two hearts are stronger than one.',n:'c3'}],e:false};
G['c2c']={title:'Chapter 2 \u00b7 The Quiet Guardian',text:'You polish the key and place it on your bedside table. Every night, it glows softly, as if calling to you.<br><br>You learn everything you can about the garden and the stories Great-Grandmother told. Old journals hidden in the attic describe a __kingdom__ of light and shadow, and a __treasure__ that can only be found by someone patient and wise. Maybe waiting is its own kind of __quest__.',words:['kingdom','treasure','quest','secret'],choices:[{t:'Open the door now \u2014 you\'ve prepared enough. It\'s time.',n:'c3c'},{t:'Wait one more day. Complete your research about the __magical__ rules.',n:'c3c'}],e:false};
G['c3']={title:'Chapter 3 \u00b7 The Whispering Woods',text:'The forest is alive with soft glowing flowers that hum gentle tunes. Pip leads you deeper into the __enchanted__ world until you reach a fork in the path.<br><br>A signpost points left to "The River of Reflections" and right to "The Mountain of Echoes." Pip explains: "One path tests your heart. The other tests your mind. Both lead to the __castle__, but each teaches something different about your __wish__."',words:['enchanted','castle','wish','wonder'],choices:[{t:'Take the River of Reflections. Your heart knows the way.',n:'c4'},{t:'Climb the Mountain of Echoes. A sharp mind finds the clearest path.',n:'c4'}],e:false};
G['c4']={title:'Chapter 4 \u00b7 The Guardian\'s Test',text:'Before the __castle__ gates stands a magnificent creature \u2014 half lion, half eagle \u2014 a griffin with eyes like molten gold. "Only those with a true __wish__ may enter," it roars.<br><br>"State your wish, young traveler. But choose carefully. A selfish __wish__ will close the gates forever. A kind __wish__ will open not just these doors, but many doors in your heart." The griffin waits, patient as stone.',words:['castle','wish','treasure','brave'],choices:[{t:'"I wish for my grandfather\'s health." Pure love guides your heart.',n:'c5'},{t:'"I wish for the __kingdom__\'s happiness." A noble heart thinks of others first.',n:'c5'}],e:false};
G['c5']={title:'Chapter 5 \u00b7 The Wishing Well',text:'The griffin steps aside. Beyond the gates lies a garden more __enchanted__ than anything you\'ve seen \u2014 flowers that sing, fountains of liquid starlight, and at the center, the legendary Wishing Well.<br><br>Pip hovers beside you. "This is it. One __wish__, one chance. The __magical__ well has waited centuries for someone worthy. What will you choose?" All your journey, every __quest__ has led here. The well\'s water shimmers, waiting.',words:['enchanted','magical','quest','wonder','wish'],choices:[{t:'Wish for Grandpa\'s health. Love for family is the purest magic.',n:'e_gold'},{t:'Wish for the __kingdom__ to flourish forever. A good ruler thinks of all.',n:'e_silver'}],e:false};
G['c3c']={title:'Chapter 3 \u00b7 The Patient Heart',text:'After days of reading Great-Grandmother\'s journals, you finally understand: the door doesn\'t need to be forced. It opens when the heart is ready.<br><br>You step through with calm purpose. The __enchanted__ world welcomes you gently, as if it\'s been expecting you all along. Pip appears with a knowing smile. "We wondered when you\'d arrive. Your patience is a rare __treasure__."',words:['enchanted','treasure','kingdom'],choices:[{t:'Apologize for the wait and begin your delayed __quest__ with humility.',n:'c4c'},{t:'Explain you wanted to be fully prepared. Respect for the __kingdom__ matters.',n:'c4c'}],e:false};
G['c4c']={title:'Chapter 4 \u00b7 A Different Kind of Magic',text:'The __kingdom__ has changed in your absence. The griffin at the gate looks tired. "You come late, traveler," it says. "The wish well\'s power fades when hearts hesitate too long."<br><br>But it also adds: "However... some __magical__ things grow stronger with waiting. Love that chooses carefully is stronger than love that rushes in. State your wish, and let us see its worth."',words:['kingdom','magical','wish'],choices:[{t:'Wish for Grandpa, with a heart full of careful hope.',n:'c5c'},{t:'Wish for understanding \u2014 to know when to act and when to wait.',n:'c5c'}],e:false};
G['c5c']={title:'Chapter 5 \u00b7 A Wish Well Earned',text:'The well glows softly \u2014 not as bright as it might have, but warmly, like a candle in a window. "Your __wish__ is granted, but gently," a voice says. "You have learned the value of patience, and that is its own __treasure__."<br><br>Not every __quest__ ends with fireworks. Some end with quiet wisdom. You return home to find Grandpa smiling more today than he has in weeks. Maybe the __magical__ worked \u2014 just in a smaller, softer way.',words:['wish','treasure','quest','magical'],choices:[{t:'Accept the gentle blessing. Even small miracles are real.',n:'e_bronze'},{t:'Promise to return one day, braver and bolder, for a bigger __wonder__.',n:'e_bronze'}],e:false};
G['e_gold']={e:true,ty:'gold',title:'Ending \u00b7 The Heart\'s True Wish',badge:'\u2b50 Best Ending',bbg:'linear-gradient(135deg,#ffd700,#ff8c00)',words:['wish','brave'],text:'You close your eyes and picture Grandpa laughing in the garden. "I wish for my grandfather to be healthy and happy again!"<br><br>The well erupts with golden light! When you open your eyes, you\'re back in Grandmother\'s garden. And there, standing by the roses with rosy cheeks and bright eyes, is Grandpa \u2014 looking stronger than he has in years.<br><br>"Something __magical__ happened," he says with a wink. You grip the golden key in your pocket. The __enchanted__ __kingdom__ blessed you because you chose love. Some __wish__es are so pure that even a __castle__ in another world must bow to them.',tip:'\ud83d\udca1 Love is the most powerful magic of all. A wish from the heart changes everything!'};
G['e_silver']={e:true,ty:'silver',title:'Ending \u00b7 A Kingdom Restored',badge:'\u2728 Great Ending',bbg:'linear-gradient(135deg,#c0c0c0,#7ec8e3)',words:['kingdom','magical'],text:'"I wish for this __kingdom__ to flourish forever!" The well\'s light spreads across the entire __enchanted__ world, healing every wilted flower and mending every cracked stone.<br><br>The griffin bows deeply. Pip dances through the air. "You chose us over yourself. You are a true guardian of the __castle__ now."<br><br>When you return home, Grandpa isn\'t completely healed \u2014 but he\'s better. The __magical__ of the kingdom flows into your world slowly, helping in quiet ways. Your selfless wish brought light to many lives.',tip:'\ud83d\udca1 Thinking of others when you could have chosen yourself \u2014 that\'s the mark of a true hero!'};
G['e_bronze']={e:true,ty:'bronze',title:'Ending \u00b7 A Gentle Light',badge:'\ud83c\udf31 Growth Ending',bbg:'linear-gradient(135deg,#cd7f32,#d4a574)',words:['wonder','treasure'],text:'Your wish came true, but softly \u2014 like morning light through a curtain. Grandpa\'s health improves slowly, day by day. The doctors are puzzled, but you know the truth.<br><br>The golden key still glows faintly on your bedside table. The door in the garden is always there, waiting. Next time, you\'ll be __brave__ enough to step through the moment you hear the call.<br><br>The __enchanted__ __kingdom__ rewarded your patience with a quiet __treasure__: the wisdom that some __wonder__s are worth waiting for, and worth trying again.',tip:'\ud83d\udca1 Even a small wish, made with love and patience, can change lives. Next time, be bold from the start!'};
var V=[];function R(id){var c=G[id];if(!c){document.getElementById('content').innerHTML='<p style="color:#fff">Error: chapter not found.</p>';return;}V.push({id:id,choice:null,title:c.title||''});var box=document.getElementById('content');if(c.e){E(c);return;}var stepIdx=V.length;var prevHtml='';if(V.length>1&&V[V.length-2]&&V[V.length-2].choice){prevHtml='<div style="font-size:0.8rem;color:rgba(255,215,0,0.5);padding:8px 14px;margin-bottom:14px;border-radius:8px;background:rgba(255,215,0,0.05);line-height:1.6">\u21b3 <span style="font-weight:600">Your choice:</span> <span style="color:#ffd700">'+V[V.length-2].choice+'</span></div>';}var opts='';for(var i=0;i<c.choices.length;i++){var esc=c.choices[i].t.replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;");opts+='<button class="choice-btn" onclick="makeChoice(\''+c.choices[i].n+'\',\''+esc+'\')"><span class="choice-num">'+(i+1)+'</span><span>'+c.choices[i].t+'</span></button>';}box.innerHTML='<div class="top-bar"><span class="badge">Chapter '+stepIdx+'</span><span class="step">Path: '+stepIdx+' steps</span></div><div class="game-title"><h1>'+GAME_TITLE+'</h1></div><div class="chapter-title">'+c.title+'</div><div class="story-box">'+prevHtml+c.text+'</div><div class="choices-label">\u2014 Make Your Choice \u2014</div><div class="choices">'+opts+'</div>';}
function makeChoice(nextId,choiceText){if(V.length>0)V[V.length-1].choice=choiceText;var safeText=choiceText.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");var overlay=document.createElement('div');overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,10,46,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;animation:fadeIn 0.3s ease';overlay.innerHTML='<div style="text-align:center;max-width:500px;padding:30px"><div style="font-size:13px;color:rgba(255,215,0,0.5);letter-spacing:2px;margin-bottom:14px;text-transform:uppercase">You Chose</div><div style="font-size:19px;color:#ffd700;font-weight:700;line-height:1.6">"'+safeText+'"</div><div style="margin-top:28px;width:40px;height:2px;background:rgba(255,215,0,0.3);margin-left:auto;margin-right:auto"></div><div style="margin-top:18px;color:rgba(255,255,255,0.25);font-size:13px">Continuing...</div></div>';document.getElementById('content').appendChild(overlay);setTimeout(function(){if(overlay.parentNode)overlay.parentNode.removeChild(overlay);R(nextId);},1200);}
function E(c){var box=document.getElementById('content');var timelineHtml='';if(V.length>0){var steps=[];for(var i=0;i<V.length;i++){var step=V[i];steps.push('<div style="display:flex;align-items:flex-start;gap:10px;padding:6px 0"><span style="flex-shrink:0;width:24px;height:24px;border-radius:50%;background:rgba(255,215,0,0.15);color:#ffd700;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold">'+(i+1)+'</span><div style="flex:1;font-size:13px;color:#ccc;line-height:1.5"><div style="color:#ffd700;font-weight:600;font-size:13px">'+(step.title||'Step '+(i+1))+'</div>'+(step.choice?'<div style="font-size:12px;color:rgba(255,215,0,0.55);margin-top:1px">\u21b3 '+step.choice+'</div>':'')+'</div></div>');}timelineHtml=steps.join('');}try{var d={title:GAME_TITLE,storyType:GAME_TYPE,date:new Date().toISOString().slice(0,10),endingTitle:c.title,endingTy:c.ty||'unknown',badge:c.badge,timeline:V,words:WORDS};var h=JSON.parse(localStorage.getItem('wordQuest_gameHistory')||'[]');h.push(d);localStorage.setItem('wordQuest_gameHistory',JSON.stringify(h));}catch(e){}box.innerHTML='<div class="ending-screen"><div class="ending-badge" style="background:'+c.bbg+';color:#1a1a2e">'+c.badge+'</div><div class="ending-title">'+c.title+'</div><div class="ending-text">'+c.text+'</div><div class="ending-tip">'+c.tip+'</div><br><div style="text-align:left;padding:14px;background:rgba(255,255,255,0.03);border-radius:12px;margin:12px 0;max-height:280px;overflow-y:auto"><div style="font-size:13px;color:rgba(255,215,0,0.55);letter-spacing:2px;margin-bottom:10px;text-align:center;text-transform:uppercase">\ud83d\udcdc Your Story Timeline</div>'+timelineHtml+'</div><br><button class="btn-yellow" onclick="S()">\u25b6 Play Again</button>&nbsp;&nbsp;<button class="btn-ghost" onclick="B()">\u2190 Go Back</button>&nbsp;&nbsp;<button class="btn-ghost" onclick="startReview()">\ud83d\udcdd Review Words</button></div>';}
function N(id){R(id);}function S(){V=[];R('start');}function B(){if(V.length<=1){S();return;}V.pop();var p=V[V.length-1];V.pop();R(p?p.id:'start');}
var _reviewState=null;function startReview(){_reviewState={words:WORDS.slice().sort(function(){return 0.5-Math.random()}),idx:0,correct:0,wrong:[]};showReviewQuestion();}
function showReviewQuestion(){var s=_reviewState;if(s.idx>=s.words.length){showReviewResult();return;}var w=s.words[s.idx];var wp=WORDS.filter(function(x){return x.w!==w.w}).map(function(x){return x.m}).sort(function(){return 0.5-Math.random()});var o=[w.m];for(var i=0;i<3&&i<wp.length;i++)o.push(wp[i]);o.sort(function(){return 0.5-Math.random()});var h='<div class="ending-screen"><div class="ending-badge" style="background:linear-gradient(135deg,#4CAF50,#2196F3);color:#fff">\ud83d\udcdd Word Review</div><div class="ending-title" style="font-size:20px;margin-bottom:20px">What does "<b>'+w.w+'</b>" mean?</div><div class="choices">';for(var j=0;j<o.length;j++){h+='<button class="choice-btn" onclick="checkReviewAnswer(\''+w.w+'\',\''+o[j].replace(/'/g,"\\'")+'\',this)"><span class="choice-num">'+(j+1)+'</span><span>'+o[j]+'</span></button>';}h+='</div><p style="color:rgba(255,255,255,0.3);font-size:13px;margin-top:16px">'+(s.idx+1)+'/'+s.words.length+'</p></div>';document.getElementById('content').innerHTML=h;}
function checkReviewAnswer(word,selected,btn){var s=_reviewState;var correct=WORDS.filter(function(w){return w.w===word})[0].m;document.querySelectorAll('.choice-btn').forEach(function(b){b.style.pointerEvents='none'});if(selected===correct){btn.style.background='rgba(76,175,80,0.3)';btn.style.borderColor='#4CAF50';s.correct++;}else{btn.style.background='rgba(244,67,54,0.3)';btn.style.borderColor='#f44336';document.querySelectorAll('.choice-btn').forEach(function(b){if(b.querySelector('span:last-child').textContent===correct){b.style.background='rgba(76,175,80,0.3)';b.style.borderColor='#4CAF50';}});s.wrong.push({w:word,m:correct});}setTimeout(function(){s.idx++;showReviewQuestion();},1200);}
function showReviewResult(){var s=_reviewState;var pct=Math.round((s.correct/s.words.length)*100);var wh='';if(s.wrong.length>0){wh='<div style="margin-top:16px;padding:12px;background:rgba(255,255,255,0.04);border-radius:12px;text-align:left"><p style="color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:8px">Words to review:</p>';for(var i=0;i<s.wrong.length;i++){wh+='<span class="tag" style="background:rgba(244,67,54,0.15);color:#ff8a80">'+s.wrong[i].w+' = '+s.wrong[i].m+'</span>&nbsp;';}wh+='</div>';}document.getElementById('content').innerHTML='<div class="ending-screen"><div class="ending-badge" style="background:linear-gradient(135deg,#ffd700,#ffaa00);color:#1a1a2e">\u2705 Review Complete!</div><div class="ending-title">'+s.correct+'/'+s.words.length+' ('+pct+'%)</div><p style="color:#e0e0e0;font-size:15px;margin-bottom:8px">'+(pct===100?'Perfect! You know all the words!':pct>=70?'Great job! Almost there!':'Keep practicing! You\'ll get it!')+'</p>'+wh+'<br><button class="btn-yellow" onclick="startReview()">\ud83d\udd04 Review Again</button>&nbsp;&nbsp;<button class="btn-ghost" onclick="S()">\u2190 Back to Story</button></div>';}
R('start');
</script></body></html>
