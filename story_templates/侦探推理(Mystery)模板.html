G['start']={title:'Chapter 1 \u00b7 The Empty Frame',text:'The morning of the school art show, chaos erupts. The centerpiece \u2014 "Moonlit Harbor," a priceless painting on loan from the city museum \u2014 has vanished! Only an empty frame remains.<br><br>Principal Hart\'s face is pale. "The show opens in three hours!" Teachers panic. Students whisper. Everyone is a __suspect__. You notice a smudge of blue paint on the window frame. This __mystery__ needs a detective. Someone __clever__ enough to find the __truth__.',words:['suspect','mystery','clever','truth'],choices:[{t:'Step forward. "I\'ll __investigate__ this case."',n:'c2a'},{t:'Start examining the __clue__s quietly. No need to announce yourself.',n:'c2b'},{t:'Report what you saw to Principal Hart. Let the adults handle it.',n:'c2c'}],e:false};
G['c2a']={title:'Chapter 2 \u00b7 The Bold Detective',text:'"I\'ll find the painting," you announce. The room goes quiet. Principal Hart hesitates, then nods.<br><br>You begin your __investigate__ immediately. The blue paint smudge is fresh \u2014 less than an hour old. A __witness__, Mia from art club, saw someone in a green hoodie near the gallery at 7 AM. You have your first __clue__ and a possible __suspect__. The case is heating up!',words:['investigate','witness','clue','suspect'],choices:[{t:'Question everyone wearing green today. Follow the __evidence__ trail.',n:'c3'},{t:'Search the art room for more paint. Match the color first.',n:'c3'}],e:false};
G['c2b']={title:'Chapter 2 \u00b7 The Quiet Observer',text:'You slip away from the crowd and study the scene. The window latch is broken from the outside. Footprints in the flowerbed lead toward the gymnasium. A scrap of paper near the frame reads: "Midnight. Corner."<br><br>You\'re building the case silently. A good detective doesn\'t need attention \u2014 they need __clue__s. The __mystery__ deepens. This is more than a simple theft. There\'s a __secret__ here waiting to be uncovered.',words:['clue','mystery','secret'],choices:[{t:'Follow the footprints alone. More __evidence__ means a stronger case.',n:'c3'},{t:'Share your findings with Mia. Two __clever__ minds solve faster.',n:'c3'}],e:false};
G['c2c']={title:'Chapter 2 \u00b7 The Messenger',text:'You tell Principal Hart everything you noticed. She thanks you and calls the police. A detective arrives within thirty minutes, taking notes and photos.<br><br>"Good eye, kid," the detective says. But they seem to be looking in the wrong places \u2014 interviewing teachers about security cameras instead of following the paint __clue__ you found. Part of you wants to do more. This __mystery__ feels personal now.',words:['clue','mystery','investigate'],choices:[{t:'Ask to assist the detective officially. You know the school better than anyone.',n:'c3c'},{t:'Continue investigating on your own. You see things the adults miss.',n:'c3c'}],e:false};
G['c3']={title:'Chapter 3 \u00b7 The Hidden Message',text:'Your investigation leads to the gym locker room. Behind locker 42, you find something unexpected: a hidden note that says "Art heals more than walls." And beneath it \u2014 a key!<br><br>The __evidence__ is piling up, but it doesn\'t point to a typical thief. This feels... different. Personal. The note suggests someone who cares about art, not someone who wants to sell a painting. What __secret__ is the __suspect__ really hiding?',words:['evidence','secret','suspect'],choices:[{t:'Use the key on every locked door in the art wing. Follow the trail.',n:'c4'},{t:'Investigate who wrote the note. Handwriting is a powerful __clue__.',n:'c4'}],e:false};
G['c4']={title:'Chapter 4 \u00b7 An Unexpected Culprit',text:'The key opens a storage room behind the stage. There, wrapped carefully in a blanket, is "Moonlit Harbor" \u2014 perfectly unharmed. And sitting beside it, crying softly, is Leo, the quietest kid in art club.<br><br>"You found me," he whispers. "My family is moving away next week. I just wanted one more day with the painting. It\'s the only thing that makes me feel... not alone." Leo isn\'t a thief \u2014 he\'s a kid who loves art too much. The __truth__ is sadder than a crime.',words:['truth','discover','secret'],choices:[{t:'Sit down beside Leo. "Tell me everything. I\'m listening."',n:'c5'},{t:'Return the painting immediately. The show must go on, no matter what.',n:'c5'}],e:false};
G['c5']={title:'Chapter 5 \u00b7 The Moment of Truth',text:'The art show starts in one hour. You know where the painting is. You know WHY Leo took it. Now comes the hardest part: deciding what to do with the __truth__.<br><br>Leo looks at you with red-rimmed eyes. "Are you going to tell everyone?" The __mystery__ is solved, but the real test of your __clever__ detective work isn\'t just finding the answer \u2014 it\'s what you do with it.',words:['truth','mystery','clever'],choices:[{t:'Help Leo return the painting himself and explain to the principal. Courage can earn forgiveness.',n:'e_gold'},{t:'Return the painting quietly. Protect Leo\'s __secret__ \u2014 some truths need kindness more than exposure.',n:'e_silver'}],e:false};
G['c3c']={title:'Chapter 3 \u00b7 The Side Investigator',text:'The detective gives you a notebook. "Write down everything you observe," she says. "You\'re my junior assistant today."<br><br>You follow her through the school, taking notes. She\'s thorough but misses small things \u2014 like the way Leo from art club keeps glancing at the gym door, or how his hands are stained blue. You circle these __clue__s in your notebook. Maybe being an observer has advantages.',words:['clue','witness','evidence'],choices:[{t:'Tell the detective about Leo right away. She needs all the __evidence__.',n:'c4c'},{t:'Talk to Leo yourself first. You want to understand before accusing.',n:'c4c'}],e:false};
G['c4c']={title:'Chapter 4 \u00b7 The Difficult Truth',text:'You find Leo behind the gym, the painting wrapped in his jacket. "I wasn\'t going to keep it," he says, tears streaming. "I just wanted to say goodbye."<br><br>Your heart sinks. Leo isn\'t a bad kid \u2014 just a lonely one. You helped solve the __mystery__, but the answer is more complicated than you expected. Some __truth__s don\'t come with easy solutions.',words:['mystery','truth','investigate'],choices:[{t:'Convince Leo to return the painting with you. Face this together.',n:'c5c'},{t:'Tell the detective where the painting is. It\'s her job to handle the rest.',n:'c5c'}],e:false};
G['c5c']={title:'Chapter 5 \u00b7 Justice and Kindness',text:'The detective listens to the full story. She\'s impressed by your work. The painting is returned safely, and Leo gets a chance to explain to the principal himself.<br><br>"Good detective work recognizes that people are more than their mistakes," the detective says, shaking your hand. "You might have a future in this."<br><br>The __truth__ came out \u2014 not perfectly, but with enough kindness to make a difference.',words:['truth','suspect','discover'],choices:[{t:'Feel proud. You helped solve the case and showed compassion too.',n:'e_bronze'},{t:'Wish you had been braver sooner. Next mystery, you\'ll lead from the start.',n:'e_bronze'}],e:false};
G['e_gold']={e:true,ty:'gold',title:'Ending \u00b7 The Power of Truth',badge:'\u2b50 Best Ending',bbg:'linear-gradient(135deg,#ffd700,#ff8c00)',words:['truth','courage'],text:'You and Leo walk into Principal Hart\'s office together. Leo explains everything \u2014 his family\'s move, his loneliness, his love for "Moonlit Harbor." He apologizes with his whole heart.<br><br>Principal Hart is moved. "Leo, we\'ll make sure you get a print of this painting to take with you. And \u2014 you\'re in charge of the art club video tribute at the show."<br><br>Leo cries happy tears. The painting goes back on the wall. The show is a triumph. And you learned that the greatest __truth__ sometimes solves more than just a __mystery__ \u2014 it heals hearts too.',tip:'\ud83d\udca1 Courage and compassion together solved the crime AND saved a friendship. That\'s the mark of a true detective!'};
G['e_silver']={e:true,ty:'silver',title:'Ending \u00b7 A Kind Solution',badge:'\u2728 Great Ending',bbg:'linear-gradient(135deg,#c0c0c0,#7ec8e3)',words:['secret','clever'],text:'You return the painting quietly, with no mention of Leo. The show goes on, and "Moonlit Harbor" shines under the gallery lights.<br><br>Later, you slip Leo a note: "I know why you did it. And I understand. Art is for everyone." He looks at you with grateful eyes and gives a tiny nod.<br><br>The __mystery__ remains a __secret__ between you two. Not all cases need public solutions. Sometimes the most __clever__ detective is the one who knows when to protect a heart.',tip:'\ud83d\udca1 Protecting someone who made a mistake out of sadness \u2014 that\'s its own kind of justice. Well done, kind detective!'};
G['e_bronze']={e:true,ty:'bronze',title:'Ending \u00b7 Detective in Training',badge:'\ud83c\udf31 Growth Ending',bbg:'linear-gradient(135deg,#cd7f32,#d4a574)',words:['investigate','mystery'],text:'The police detective gives you a junior detective badge. "You\'ve got sharp eyes, kid. Come back in ten years and apply for real."<br><br>You smile, but inside, you\'re already thinking about all the clues you missed. The __mystery__ was solved, but you wish you\'d been the one to solve it from the very beginning.<br><br>Next time something goes missing, you\'ll be the first to __investigate__. No waiting. No hesitation. The world is full of puzzles, and you\'re just getting started.',tip:'\ud83d\udca1 Every great detective starts somewhere. You learned to see what others miss \u2014 now sharpen those skills for next time!'};

var _reviewState=null;function startReview(){_reviewState={words:WORDS.slice().sort(function(){return 0.5-Math.random()}),idx:0,correct:0,wrong:[]};showReviewQuestion();}
